# docker-compose.yml - 情绪爆破局本地编排
# 包含 postgres / redis / server / client 四个服务

services:
  # ===== PostgreSQL 数据库 =====
  postgres:
    image: postgres:16-alpine
    container_name: emotion-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # 安全加固：端口仅绑定 127.0.0.1，避免数据库端口对外网暴露被扫描爆破
    # 容器间通信（server → postgres）走 docker 内部网络，不依赖端口映射
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===== Redis 缓存 =====
  redis:
    image: redis:7-alpine
    container_name: emotion-redis
    restart: unless-stopped
    # 安全加固：端口仅绑定 127.0.0.1，避免 Redis 端口对外网暴露被扫描利用（未授权访问是 Redis 最常见安全事件）
    # 容器间通信（server → redis）走 docker 内部网络，不依赖端口映射
    ports:
      - "127.0.0.1:6379:6379"
    # 若设置了 REDIS_PASSWORD 则启用密码认证，未设置则无密码（兼容无密码开发环境）
    # 用 sh -c 条件判断而非直接 --requirepass：避免无密码环境下 redis 启动失败
    command: sh -c 'if [ -n "$$REDIS_PASSWORD" ]; then redis-server --requirepass "$$REDIS_PASSWORD"; else redis-server; fi'
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    healthcheck:
      # 适配有无密码：REDIS_PASSWORD 设置时带 -a 认证，未设置时普通 ping
      # --no-auth-warning 抑制命令行传密码的安全警告（容器内环境，警告无意义）
      test: ["CMD-SHELL", "redis-cli $${REDIS_PASSWORD:+-a $${REDIS_PASSWORD} --no-auth-warning} ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===== 后端服务 =====
  server:
    build: ./server
    container_name: emotion-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "3000:3000"

  # ===== 前端服务 =====
  client:
    build: ./client
    container_name: emotion-client
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "80:80"

volumes:
  postgres_data:
